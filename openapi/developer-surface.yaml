      type: object
      required: [data, meta, error]
      properties:
        data:
          $ref: '#/components/schemas/OwnerOperationCatalog'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
        error:
          anyOf:
            - $ref: '#/components/schemas/ErrorResponse'
            - type: 'null'

    OwnerOperationExecutionRequest:
      type: object
      required: [operation]
      properties:
        operation: { type: string }
        params:
          type: object
          additionalProperties: true
        lang: { type: string, enum: [ja, en] }

    OwnerOperationExecutionResult:
      type: object
      required: [agent_id, message, action, result]
      properties:
        agent_id: { type: string }
        message: { type: string }
        action: { type: string }
        result:
          type: object
          additionalProperties: true

    OwnerOperationExecutionEnvelope:
      type: object
      required: [data, meta, error]
      properties:
        data:
          $ref: '#/components/schemas/OwnerOperationExecutionResult'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
        error:
          anyOf:
            - $ref: '#/components/schemas/ErrorResponse'
            - type: 'null'

    CreateWebhookSubscriptionRequest:
      type: object
      required: [callback_url, event_types]
      properties:
        callback_url: { type: string, format: uri }
        description: { type: string, nullable: true }
        event_types:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/WebhookEventType'
        metadata:
          type: object
          additionalProperties: true

    SendTestWebhookDeliveryRequest:
      type: object
      required: [event_type]
      properties:
        event_type:
          $ref: '#/components/schemas/WebhookEventType'
        data:
          type: object
          additionalProperties: true
        subscription_ids:
          type: array
          items: { type: string }

    WebhookEventType:
      type: string
      enum:
        - subscription.created
        - subscription.renewed
        - subscription.cancelled
        - subscription.paused
        - subscription.reinstated
        - payment.succeeded
        - payment.failed
        - capability.published
        - capability.delisted
        - execution.completed
        - execution.failed

    WebhookEvent:
      type: object
      required: [id, type, api_version, occurred_at, idempotency_key, data]
      properties:
        id: { type: string }
        type:
          $ref: '#/components/schemas/WebhookEventType'
        api_version: { type: string }
        occurred_at: { type: string }
        idempotency_key: { type: string }
        trace_id: { type: string, nullable: true }
        data:
          type: object
          additionalProperties: true

    WebhookSubscription:
      type: object
      required: [id, owner_user_id, callback_url, status, event_types]
      properties:
        id: { type: string }
        owner_user_id: { type: string }
        callback_url: { type: string, format: uri }
        status: { type: string, enum: [active, paused] }
        event_types:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventType'
        description: { type: string, nullable: true }
        signing_secret_hint: { type: string, nullable: true }
        signing_secret: { type: string, nullable: true }
        metadata:
          type: object
          additionalProperties: true
        last_delivery_at: { type: string, nullable: true }
        created_at: { type: string, nullable: true }
        updated_at: { type: string, nullable: true }

    WebhookDelivery:
      type: object
      required:
        - id
        - subscription_id
        - event_id
        - event_type
        - idempotency_key
        - callback_url
        - delivery_status
        - request_headers
        - request_body
        - response_headers
        - attempt_count
      properties:
        id: { type: string }
        subscription_id: { type: string }
        event_id: { type: string }
        event_type:
          $ref: '#/components/schemas/WebhookEventType'
        idempotency_key: { type: string }
        callback_url: { type: string, format: uri }
        delivery_status: { type: string, enum: [queued, delivering, delivered, failed] }
        request_headers:
          type: object
          additionalProperties: true
        request_body:
          type: object
          additionalProperties: true
        response_status: { type: integer, nullable: true }
        response_headers:
          type: object
          additionalProperties: true
        response_body: {}
        duration_ms: { type: integer, nullable: true }
        attempt_count: { type: integer }
        last_attempt_at: { type: string, nullable: true }
        delivered_at: { type: string, nullable: true }
        error_message: { type: string, nullable: true }
        trace_id: { type: string, nullable: true }
        created_at: { type: string, nullable: true }
        updated_at: { type: string, nullable: true }

    QueuedWebhookEvent:
      type: object
      required: [queued, event]
      properties:
        queued: { type: boolean }
        event:
          $ref: '#/components/schemas/WebhookEvent'

    WebhookSubscriptionEnvelope:
      type: object
      required: [data, meta, error]
      properties:
        data:
          $ref: '#/components/schemas/WebhookSubscription'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
        error:
          anyOf:
            - $ref: '#/components/schemas/ErrorResponse'
            - type: 'null'

    WebhookSubscriptionListEnvelope:
      type: object
      required: [data, meta, error]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WebhookSubscription'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
        error:
          anyOf:
            - $ref: '#/components/schemas/ErrorResponse'
            - type: 'null'

    WebhookDeliveryEnvelope:
      type: object
      required: [data, meta, error]
      properties:
        data:
          $ref: '#/components/schemas/WebhookDelivery'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
        error:
          anyOf:
            - $ref: '#/components/schemas/ErrorResponse'
            - type: 'null'

    WebhookDeliveryListEnvelope:
      type: object
      required: [data, meta, error]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WebhookDelivery'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
        error:
          anyOf:
            - $ref: '#/components/schemas/ErrorResponse'
            - type: 'null'

    QueuedWebhookEventEnvelope:
      type: object
      required: [data, meta, error]
      properties:
        data:
          $ref: '#/components/schemas/QueuedWebhookEvent'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
        error:
          anyOf:
            - $ref: '#/components/schemas/ErrorResponse'
            - type: 'null'

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code: { type: string, description: "Machine-readable error code (e.g. NOT_FOUND, VALIDATION_ERROR)" }
        message: { type: string, description: "Human-readable error description" }
        details: { type: object, nullable: true, description: "Optional structured error details" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

security:
  - bearerAuth: []
