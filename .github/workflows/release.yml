name: Release to PyPI

# Triggered when a tag matching v* is pushed (e.g. v0.2.1, v0.3.0).
# Uses PyPI Trusted Publisher (OIDC) — no API token needed once the
# publisher is configured on the PyPI side.
#
# SETUP (one-time, PyPI-side — operator task):
#   1. Sign in to https://pypi.org/manage/account/publishing/
#   2. Add a new pending publisher with:
#      - PyPI project name: siglume-api-sdk
#      - GitHub org: taihei-05
#      - Repository name: siglume-api-sdk
#      - Workflow filename: release.yml
#      - Environment name: pypi (matches the `environment:` below)
#   3. Create a GitHub environment named "pypi" with (optional) protection rules:
#      https://github.com/taihei-05/siglume-api-sdk/settings/environments/new
#      - Required reviewers: taihei-05
#      - Deployment branches: Protected branches only
#
# After setup, publishing is: `git tag vX.Y.Z && git push origin vX.Y.Z`.
# No token, no `.pypirc` needed. See RELEASING.md for the full flow.
#
# SECURITY NOTES (per Codex bot review):
#   - workflow_dispatch input is validated as a real annotated tag before build
#   - Build and publish are split into two jobs: build has no id-token perm,
#     publish has id-token:write but does not execute build dependencies.
#     This prevents a compromised build dep from exfiltrating the OIDC token.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing annotated tag to build and publish (e.g. v0.2.1). Must already exist in refs/tags/.'
        required: true

permissions:
  contents: read

jobs:
  # Job 1: validate the tag ref and build artifacts. No id-token perm.
  # A compromised build dep here CANNOT mint an OIDC token.
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      resolved-ref: ${{ steps.resolve.outputs.resolved-ref }}
    steps:
      - name: Resolve and validate tag ref
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            # Push event — ref is refs/tags/vX.Y.Z
            TAG="${PUSH_REF#refs/tags/}"
            if [ "$TAG" = "$PUSH_REF" ]; then
              echo "::error::Workflow triggered by push but ref was not a tag: $PUSH_REF"
              exit 1
            fi
          fi
          case "$TAG" in
            v*) ;;
            *) echo "::error::Tag must start with 'v' (got: $TAG)"; exit 1 ;;
          esac
          echo "Resolved tag: $TAG"
          echo "resolved-ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"
          echo "resolved-tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout at resolved tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.resolved-ref }}
          fetch-depth: 0

      - name: Verify ref is a real annotated tag (not a branch with similar name)
        env:
          RESOLVED_TAG: ${{ steps.resolve.outputs.resolved-tag }}
        run: |
          set -euo pipefail
          # `git rev-parse --verify refs/tags/TAG` fails if TAG is not a real tag object.
          # This guards against the case where someone pushes a branch named v0.3.0.
          if ! git rev-parse --verify "refs/tags/$RESOLVED_TAG" > /dev/null 2>&1; then
            echo "::error::refs/tags/$RESOLVED_TAG does not exist as a tag object"
            exit 1
          fi
          # Prefer annotated tags for releases (lightweight tags also accepted, but warn).
          TAG_TYPE=$(git cat-file -t "refs/tags/$RESOLVED_TAG")
          echo "Tag type: $TAG_TYPE"
          if [ "$TAG_TYPE" != "tag" ]; then
            echo "::warning::$RESOLVED_TAG is a lightweight tag. Annotated tags (-a) are recommended for releases."
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine

      - name: Verify version in pyproject.toml matches tag
        env:
          RESOLVED_TAG: ${{ steps.resolve.outputs.resolved-tag }}
        run: |
          set -euo pipefail
          TAG_VERSION="${RESOLVED_TAG#v}"
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          echo "Tag version:       $TAG_VERSION"
          echo "pyproject version: $PYPROJECT_VERSION"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag version '$TAG_VERSION' does not match pyproject.toml version '$PYPROJECT_VERSION'"
            exit 1
          fi

      - name: Verify TS package version matches tag
        env:
          RESOLVED_TAG: ${{ steps.resolve.outputs.resolved-tag }}
        run: |
          set -euo pipefail
          TAG_VERSION="${RESOLVED_TAG#v}"
          PACKAGE_VERSION=$(python - <<'PY'
          import json
          with open("siglume-api-sdk-ts/package.json", "r", encoding="utf-8") as fh:
              print(json.load(fh)["version"])
          PY
          )
          echo "Tag version:        $TAG_VERSION"
          echo "package.json ver.:  $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version '$TAG_VERSION' does not match siglume-api-sdk-ts/package.json version '$PACKAGE_VERSION'"
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: Inspect and validate artifacts
        run: |
          ls -lh dist/
          python -m twine check dist/*

      - name: Upload artifacts for publish job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 3

  # Job 2: publish only. Has id-token:write for OIDC but does NOT run
  # build dependencies. Artifacts come from the build job via upload-artifact.
  # This is the privilege-minimization pattern recommended by PyPA.
  publish:
    name: Publish to PyPI via OIDC
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/siglume-api-sdk/
    permissions:
      # Publish needs id-token:write; build above did not.
      id-token: write
    steps:
      - name: Download dist artifacts from build job
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via OIDC
        # pypa/gh-action-pypi-publish@release/v1 implements PEP 740 /
        # Trusted Publisher. No API token needed — GitHub OIDC proves
        # that this workflow ran on the registered repo/branch/workflow.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PEP 740 digital attestations for each artifact, published on PyPI.
          attestations: true

  # Job 3: publish the TypeScript package to npm. Independent of PyPI —
  # runs on the same tag push. Uses NPM_TOKEN from the repo secrets
  # (automation token with 2FA-exempt publish scope).
  #
  # SETUP (one-time, npm-side — operator task):
  #   1. Sign in to https://www.npmjs.com/
  #   2. Create an Automation access token (Settings → Access Tokens →
  #      Generate New Token → Automation). This is 2FA-exempt and meant
  #      for CI.
  #   3. Add the token as a GitHub secret named NPM_TOKEN:
  #      https://github.com/taihei-05/siglume-api-sdk/settings/secrets/actions/new
  #   4. Ensure package.json "name" matches the npm scope you control
  #      (currently @siglume/api-sdk).
  #
  # If NPM_TOKEN is not set, the job skips with a warning so
  # PyPI-only releases still succeed.
  publish-npm:
    name: Publish TS to npm
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@siglume/api-sdk
    permissions:
      contents: read
      # Required for `npm publish --provenance` on GitHub-hosted runners.
      id-token: write
    steps:
      - name: Check out the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check for NPM_TOKEN
        id: npm_token
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN is not set; skipping npm publish."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies (TS package)
        if: steps.npm_token.outputs.present == 'true'
        working-directory: siglume-api-sdk-ts
        run: npm ci

      - name: Build TS package
        if: steps.npm_token.outputs.present == 'true'
        working-directory: siglume-api-sdk-ts
        run: npm run build

      - name: Publish to npm
        if: steps.npm_token.outputs.present == 'true'
        working-directory: siglume-api-sdk-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # --access public because the package is scoped (@siglume/...)
        # and npm defaults scoped packages to private.
        run: npm publish --access public --provenance
