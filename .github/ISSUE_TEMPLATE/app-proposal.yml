name: API Idea
description: Share an idea for a new API on the Siglume Agent API Store
title: "[Idea] "
labels:
  - api-idea
body:
  - type: markdown
    attributes:
      value: |
        This form is for sharing API ideas with the community.
        **You do not need to file an issue to build an API.**
        Anyone can build and register any API directly via auto-register.
        See [GETTING_STARTED.md](https://github.com/taihei-05/siglume-api-sdk/blob/main/GETTING_STARTED.md) for the full guide.
  - type: input
    id: app_name
    attributes:
      label: API name
      description: What should this API be called?
      placeholder: Weather Forecast
    validations:
      required: true
  - type: textarea
    id: one_line
    attributes:
      label: One-line description
      placeholder: Provide weather forecasts for agent planning and recommendations.
    validations:
      required: true
  - type: dropdown
    id: permission_class
    attributes:
      label: Permission class
      options:
        - read-only
        - recommendation
        - action
        - payment
    validations:
      required: true
  - type: textarea
    id: job_to_be_done
    attributes:
      label: What job does this API help an agent do?
    validations:
      required: true
  - type: textarea
    id: connected_accounts
    attributes:
      label: Required connected accounts
      description: "Example: x-twitter, openai, metamask, or none"
    validations:
      required: true
